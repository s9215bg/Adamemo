<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6f5b" />
    <title>Adamemo</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div id="app-shell" class="app-shell home-mode">
      <header class="app-header">
        <button id="back-button" class="icon-button hidden" type="button" aria-label="返回">←</button>
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">A</span>
          <div>
            <h1>Adamemo</h1>
            <p id="sync-status">正在連線 Firebase</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="share-link-button" class="header-action-button hidden" type="button">分享</button>
          <button id="login-button" class="header-action-button" type="button">登入</button>
          <button id="admin-status" class="admin-status hidden" type="button">On</button>
          <button id="refresh-button" class="icon-button" type="button" aria-label="清除快取並重新載入">↻</button>
        </div>
      </header>

      <main class="main-panel">
        <section id="home-view" class="home-view" aria-label="主要入口">
          <button class="entry-card todo-card" data-section="task" type="button">
            <span class="entry-label">To do</span>
            <strong id="todo-count">0</strong>
            <small>整理待辦與期限</small>
          </button>

          <button class="entry-card list-card" data-section="info" type="button">
            <span class="entry-label">List</span>
            <strong id="list-count">0</strong>
            <small>保存資料與曲目清單</small>
          </button>
        </section>

        <section id="section-view" class="section-view hidden" aria-labelledby="section-title">
          <div class="section-toolbar">
            <div>
              <h2 id="section-title">To do</h2>
              <p id="section-summary">0 個項目</p>
            </div>
          </div>

          <div id="filter-controls" class="filter-controls">
            <div class="search-filter-bar">
              <input id="search-input" class="search-input" type="search" placeholder="搜尋標題、內容或標籤" autocomplete="off" />
              <button id="filter-toggle" class="filter-toggle-button hidden" type="button" aria-expanded="false" aria-controls="score-filters">篩選</button>
            </div>
            <section id="score-filters" class="score-filters hidden" aria-label="難度篩選">
              <label>
                <span>木管</span>
                <select id="filter-woodwind" data-score-filter="woodwind">
                  <option value="">全部</option>
                  <option value="1">1 星</option>
                  <option value="2">2 星</option>
                  <option value="3">3 星</option>
                  <option value="4">4 星</option>
                  <option value="5">5 星</option>
                </select>
              </label>
              <label>
                <span>銅管</span>
                <select id="filter-brass" data-score-filter="brass">
                  <option value="">全部</option>
                  <option value="1">1 星</option>
                  <option value="2">2 星</option>
                  <option value="3">3 星</option>
                  <option value="4">4 星</option>
                  <option value="5">5 星</option>
                </select>
              </label>
              <label>
                <span>打擊</span>
                <select id="filter-percussion" data-score-filter="percussion">
                  <option value="">全部</option>
                  <option value="1">1 星</option>
                  <option value="2">2 星</option>
                  <option value="3">3 星</option>
                  <option value="4">4 星</option>
                  <option value="5">5 星</option>
                </select>
              </label>
              <div class="filter-actions">
                <button id="filter-clear" class="secondary-button compact-button" type="button">清除篩選</button>
                <button id="filter-done" class="primary-button compact-button" type="button">完成</button>
              </div>
            </section>
          </div>
          <div id="item-list" class="item-list"></div>
          <button id="new-item-button" class="add-item-button" type="button">新增</button>
        </section>
      </main>
      <div id="login-panel" class="login-panel hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <form id="login-form" class="login-card">
          <div class="login-card-header">
            <h2 id="login-title">管理員登入</h2>
            <button id="login-close-button" class="icon-button" type="button" aria-label="關閉登入">×</button>
          </div>
          <label class="field">
            <span>管理員密碼</span>
            <input id="login-passcode" name="password" type="password" autocomplete="current-password" enterkeyhint="done" />
          </label>
          <p id="login-message" class="login-message" aria-live="polite"></p>
          <button id="login-submit-button" class="primary-button" type="submit">登入</button>
        </form>
      </div>
      <footer class="safe-footer" aria-hidden="true"></footer>
    </div>

    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
